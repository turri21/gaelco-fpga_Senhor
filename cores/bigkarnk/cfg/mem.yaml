# cfg/mem.yaml — subsistema de memoria del core JTBIGKARNK (Big Karnak, Gaelco 1991).
#
# jtcore (memgen) genera jtbigkarnk_game_sdram.v (GAMETOP): slots SDRAM por banco/bus +
# jtframe_dwnld. Conecta hdl/jtbigkarnk_game.v por NOMBRE de bus.
#
# Reparto = el de la .mra (ver cfg/macros.def). SIN BRAM PROM (no hay DS5002).
# Las VRAM/screenram/paleta/sprite-RAM van DENTRO de jtbigkarnk_game (bigkarnk_vmem, BRAM).
#
# Mapa 68000 (gaelco.cpp bigkarnk_map):
#   0x000000-0x07ffff R   ROM 512KB                       -> bank0 'main' (DW16)
#   0x100000-0x101fff W   videoram (8KB, SIN cifrar)
#   0x102000-0x103fff RW  screenram (8KB, SIN cifrar)
#   0x108000-0x108007 W   vregs (4x u16 scroll)
#   0x10800c          W   irqack/watchdog
#   0x200000-0x2007ff RW  paleta (1024 entradas xBGR-555)
#   0x440000-0x440fff RW  spriteram (4KB)
#   0x700000/2/4/6/8  R   DSW1 / DSW2 / P1 / P2 / SERVICE
#   0x70000b          W   LS259 outlatch (coin lockout/counter)
#   0x70000f          W   soundlatch -> FIRQ del 6809
#   0xff8000-0xffffff RW  work RAM 32KB
#
# Mapa 6809 de sonido (gaelco.cpp bigkarnk_snd_map): RAM interna 2KB + OKI/YM/latch + ROM 64KB.
# ⚠ addr_width PROVISIONALES: ajustar al construir con la ROM real (region sizes de memgen).

sdram:
  banks:
    # Bank 0: programa del 68000 (512KB, 16-bit). Bus 'main' (jtframe reserva prog_* para la descarga).
    - buses:
        - { name: main, addr_width: 19, data_width: 16 }

    # Bank 1: graficos (2MB, 4bpp planar RGN_FRAC(1,4)). 3 clientes DW32 (4 planos por lectura):
    #   gfx0 = tilemap L0, gfx1 = tilemap L1, gfxs = sprites. 4 planos de 512KB c/u (h5,h10,h8,h6).
    # ⚠ addr_width=21 (NO 20): el byte-within-plane (rom_a/srom_a) llega a 0x7FFFF (19b) y el puerto
    #   memgen es [aw-2:2]. Con aw=20 -> puerto [19:2]=18b -> TRUNCA srom_a[19:18]: los sprites de
    #   codigo alto (p.ej. texto 0xa0xx -> rom_a con bit18) leian la palabra equivocada (bloques
    #   rosas). El tilemap se salvaba de chiripa (tiles del titulo sin bit18). aw=21 = como squash.
    - buses:
        - { name: gfx0, addr_width: 21, data_width: 32 }
        - { name: gfx1, addr_width: 21, data_width: 32 }
        - { name: gfxs, addr_width: 21, data_width: 32 }

    # Bank 2: muestras del OKI MSM6295 (256KB, 8-bit, NO banked). Lo lee bigkarnk_sound (jt6295).
    - buses:
        - { name: oki, addr_width: 18, data_width: 8 }

    # Bank 3: ROM del 6809 de sonido (64KB, 8-bit). Lo lee bigkarnk_sound (rom_addr/rom_cs/rom_ok).
    #   Nombre snd0 (NO 'snd', que colisionaria con el puerto de audio 'snd').
    - buses:
        - { name: snd0, addr_width: 16, data_width: 8 }
